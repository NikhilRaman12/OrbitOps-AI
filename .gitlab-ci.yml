stages:
  - test
  - security
  - build

backend:test:
  image: python:3.12-slim
  stage: test
  script:
    - pip install --no-cache-dir -r requirements.txt
    - pytest -q

frontend:build:
  image: node:22-alpine
  stage: build
  script:
    - cd frontend
    - npm install
    - npm run build

dependency:scan:
  image: python:3.12-slim
  stage: security
  script:
    - python -m compileall backend

